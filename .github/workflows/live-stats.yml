name: Access0x1 live-stats

# Refresh the trust numbers shown on the site (test count, testnet/verification
# status) from their real sources, so nobody re-types them. Writes
# assets/js/live-stats.js and commits it back. Runs daily + on demand.
#
# The TEST COUNT is measured keyless (forge test --list on the public Access0x1
# repo). The VERIFICATION step is optional: it only runs when the
# ETHERSCAN_API_KEY secret is set — otherwise the committed verified/testnets
# values stay as the last-known-good fallback (never blanked). Because
# gen-live-stats.mjs leaves any un-provided field untouched, a partial or failed
# run degrades to a stale-but-true page, per the acceptance criteria.

on:
  schedule:
    - cron: '17 6 * * *' # daily ~06:17 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/live-stats.yml'
      - 'scripts/gen-live-stats.mjs'

permissions:
  contents: write

concurrency:
  group: live-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout portfolio
        uses: actions/checkout@v4

      - name: Checkout Access0x1 (public, read-only)
        uses: actions/checkout@v4
        with:
          repository: Access0x1/Access0x1
          submodules: recursive
          path: access0x1

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Access0x1 deps (Chainlink contracts)
        working-directory: access0x1
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Measure the real passing-test count
        id: count
        working-directory: access0x1
        run: |
          N=$(forge test --list --json | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{const j=JSON.parse(d);let n=0;for(const f of Object.values(j))for(const t of Object.values(f))n+=t.length;process.stdout.write(String(n))})')
          echo "tests=$N" >> "$GITHUB_OUTPUT"
          echo "measured $N tests"

      # Verification refresh — queries each mirror chain's block explorer
      # (scripts/check-verification.mjs: Etherscan V2 keyed for the
      # Etherscan-family incl. Snowscan/Fuji, Blockscout keyless for Arc /
      # Robinhood / Celo, zkSync explorer). Conservative: an unreachable explorer
      # is NOT counted, so the number can only understate. Runs only when the
      # ETHERSCAN_API_KEY secret is set; absent it, verified/testnets keep their
      # committed fallback (the generator leaves un-provided fields untouched).
      - name: Verification status (block explorers)
        id: verify
        run: |
          if [ -z "${ETHERSCAN_API_KEY:-}" ]; then
            echo "no ETHERSCAN_API_KEY secret — keeping the committed verified/testnets fallback"
            exit 0
          fi
          OUT=$(node scripts/check-verification.mjs) || OUT=""
          echo "explorer result: ${OUT:-<none>}"
          if [ -n "$OUT" ]; then
            V=$(printf '%s' "$OUT" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{process.stdout.write(String(JSON.parse(d).verified))}catch{}})')
            T=$(printf '%s' "$OUT" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{process.stdout.write(String(JSON.parse(d).testnets))}catch{}})')
            [ -n "$V" ] && echo "verified=$V" >> "$GITHUB_OUTPUT"
            [ -n "$T" ] && echo "testnets=$T" >> "$GITHUB_OUTPUT"
          fi
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          ARC_SCAN_VERIFIER_URL: 'https://testnet.arcscan.app/api?'

      - name: Date stamp (the "as of")
        id: date
        run: echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Regenerate live-stats.js
        run: node scripts/gen-live-stats.mjs
        env:
          STAT_TESTS: ${{ steps.count.outputs.tests }}
          STAT_VERIFIED: ${{ steps.verify.outputs.verified }}
          STAT_TESTNETS: ${{ steps.verify.outputs.testnets }}
          STAT_DATE: ${{ steps.date.outputs.today }}

      - name: Commit if the numbers changed
        run: |
          if git diff --quiet -- assets/js/live-stats.js; then
            echo "no change — live-stats.js already current"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/js/live-stats.js
            git commit -m "chore(stats): refresh Access0x1 live-stats (checked daily)"
            git push
          fi
